services:
  caseitau.api:
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_HTTP_PORTS=80
      - ASPNETCORE_HTTPS_PORTS=443
    ports:
      - "5000:80"
      - "5001:443"
    volumes:
      - ${APPDATA}/ASP.NET/Https:/home/app/.aspnet/https:ro # HTTPS Certificate
      - ${APPDATA}/ASP.NET/Https:/root/.aspnet/https:ro     # HTTPS Certificate