services:
  caseitau.api:
    image: ${DOCKER_REGISTRY-}caseitauapi
    container_name: CaseItau.Api
    build:
      context: .
      dockerfile: src/CaseItau.API/Dockerfile

  caseitau.db:
    image: postgres:16-alpine
    container_name: CaseItau.Db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: caseitau
    volumes: 
      - ./.containers/db/data:/var/lib/postgresql/data
    ports:
      - 5432:5432 

  caseitau.seq:
    image: datalust/seq:2023
    container_name: CaseItau.Seq
    environment:
      ACCEPT_EULA: Y
    ports:
      - 5341:5431
      - 8081:80